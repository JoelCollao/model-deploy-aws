name: Deploy to ECR

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push image
        run: |
          docker build -t model-deploy-aws .
          docker tag model-deploy-aws:latest 140910872380.dkr.ecr.us-east-2.amazonaws.com/model-deploy-aws:latest
          docker push 140910872380.dkr.ecr.us-east-2.amazonaws.com/model-deploy-aws:latest
